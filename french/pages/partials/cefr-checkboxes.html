<fieldset id="checkboxes">
    <legend>Types d'exercices</legend>
    
    <div id="exercise-types">
        <label class="for-checkbox">
            <input type="checkbox" name="conjugations" />Conjugaisons
        </label>
        <label class="for-checkbox">
            <input type="checkbox" name="tense-sequence" />Concordance des temps
        </label>
        <label class="for-checkbox" title="pronoms, conjonctions, déterminant">
            <input type="checkbox" name="others" />pronom / conj. / déterm.
        </label>
        <label class="for-checkbox">
            <input type="checkbox" name="prepositions" />Prépositions
        </label>
        <label class="for-checkbox">
            <input type="checkbox" name="vocabulary" />Vocabulaire
        </label>
    </div>

    <label class="for-checkbox not-disableable" style="float: left">
        <input type="checkbox" name="duration" />Colonne de durée
    </label>

    <div id="language-levels">
        <label class="for-checkbox"><input type="checkbox" name="A1" />A1</label>

        <label class="for-checkbox"><input type="checkbox" name="A2" />A2</label>

        <label class="for-checkbox"><input type="checkbox" name="B1" />B1</label>

        <label class="for-checkbox"><input type="checkbox" name="B2" />B2</label>

        <label class="for-checkbox"><input type="checkbox" name="C1" />C1</label>
    </div>
</fieldset>
