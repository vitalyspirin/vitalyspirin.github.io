<!DOCTYPE html>

<html lang="fr">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>French resources</title>

  <link rel="icon" type="image/x-icon" href="../images/eiffel-tower.ico">
  <link rel="stylesheet" href="../styles.css">

  <script type="module">
    "use strict";

    import { System } from '../js/System.mjs';

    System.initialize(
      document.getElementById('stats'),
      document.getElementById('download-stats'),
      document.getElementById('upload-stats')
    );

  </script>
</head>

<body>
  <main>
    <article>
      <header>
        <h2 id="page-title">Paramètres</h2>
      </header>

      <a id="download-stats" class="wide" href="#" download="french_conjugations_stats.json">
        Télécharger les données statistiques
      </a>

      <input type="file" id="file-input" style="display: none;">

      <a id="upload-stats" class="wide" href="#">
        Importer des données stats à partir d’un fichier
      </a>
      
      <textarea id="stats" readonly="readonly"></textarea>

    </article>
  </main>

  <iframe src="partials/home-icon.html"
    onload="this.before(...(this.contentWindow.document.body||this.contentWindow.document).children);this.remove()"></iframe>

</body>

</html>
