  <style>
    main {
      width: 50em;
      margin: auto;
      --error-color: red;
      font-family: sans-serif;
      line-height: 1.5;
    }

    #test-progress {
      font-family: "Courier New", Courier, monospace;
    }

    h2 {
      text-align: center;
    }

    iframe {
      display: block;
      margin: auto;
      width: 100%;
      height: 30em;
    }

    button {
      width: 30rem;
      font-size: 1.17em;
      display: block;
      color: #222;
      background-color: rgb(194 231 255);
      border: 1px solid rgb(194 231 255);
      border-radius: 0.5rem;
      margin: 1.5rem auto;
      padding: 0.5rem 0;
      text-decoration: none;
      text-align: center;
    }

    .failed {
      color: var(--error-color);
    }

    .passed-test .failed {
      display: none;
    }

    .failed-test .passed {
      display: none;
    }

    .http-response-code:not(.failed) {
      display: none;
    }

    .css:not(.failed) {
      display: none;
    }

    .favicon:not(.failed) {
      display: none;
    }

    .broken-links:not(.failed) {
      display: none;
    }
  </style>

  <script type="module">
    "use strict";

    import { Test } from './Test.mjs';

    Test.initialize(
      document.getElementById('start-tests'),
      document.getElementById('test-bed'),
      document.getElementById('test-progress'),
      document.getElementById('test-results')
    );

    document.getElementById('test-test-system').onclick = () => { Test.testSystem() };
  </script>
</head>

<body>
  <main>
    <article>
      <header>
        <h2 id="page-title">Test</h2>
      </header>

      <button id="start-tests">Launch tests</button>
      <button id="test-test-system">Test test system</button>

      <div>
        Progress: <span id="test-progress"></span>
      </div>

      <template id="test-result-template">
        <li>
          <div>
            <span class="page-url"></span> :
            <span class="passed">PASSED</span>
            <span class="failed">FAILED</span>
            <div class="http-response-code">HttpResponseCode : </div>
            <div class="css">Loading CSS</div>
            <div class="favicon">Loading Favicon : </div>
            <div class="broken-links">Broken A links : </div>
          </div>
        </li>
      </template>

      <h3>Test results:</h3>
      <ol id="test-results"></ol>

      <iframe id="test-bed"></iframe>
    </article>
  </main>


</body>

</html>
