  <link rel="stylesheet" href="test.css" />

  <script type="module">
    "use strict";

    import View from './js/View.mjs';
    import ViewModel from './js/ViewModel.mjs';
    import Controller from './js/Controller.mjs';

    const view = new View(
      document.getElementById('test-bed'),
      document.getElementById('test-progress'),
      document.getElementById('test-results'),
      document.getElementById('test-result-template')
    );

    const controller = new Controller(view);

    document.getElementById('start-tests').onclick = () => {
      const viewModel = new ViewModel(document.getElementsByTagName('input'));
      controller.startTests(viewModel);
    };

    document.getElementsByTagName('form').item(0).addEventListener("keydown", (e) => { 
      if (e.key === "Enter") {
        document.getElementById('start-tests').click();
      }
    });
  </script>
</head>

<body>
  <main>
    <article>
      <header>
        <h2 id="page-title">Test</h2>
      </header>

      <form class="clear"  onsubmit="console.log('form')">

        <fieldset>
          <legend>Test types:</legend>

          <div class="justify">
            <label class="wide">
              <input type="checkbox" name="httpResponseCode" checked="checked" disabled="disabled" />Http Response Code
            </label>
            <label><input type="checkbox" name="aLinks" checked="checked" />A links</label>
            <label><input type="checkbox" name="favicon" checked="checked" />Favicon</label>
            <label><input type="checkbox" name="xml" checked="checked" />XML validation</label>
          </div>

          <div>
            <label><input type="checkbox" name="css" checked="checked" />CSS</label>
            <label class="extra-wide">variable to check:
              <code>var(<input type="text" name="cssVar" value="--text-color"/>)</code>
            </label>
          </div>
        </fieldset>

        <div>Process only <input id="number-of-pages" name="numberOfPages" type="number" value="4" /> pages.</div>
        <div>
          Starting page
          <input class="extra-wide" name="startingPage" type="text" value="./sample-tests/passed-test.html" />
        </div>

        <button id="start-tests" type="button">Launch tests</button>
      </form>

      <section>
        Progress: <span id="test-progress"></span>
      </section>

      <template id="test-result-template">
        <li>
          <div>
            <span class="page-url"></span> :
            <span class="passed">PASSED</span>
            <span class="failed">FAILED</span>
            <div class="http-response-code">HttpResponseCode : </div>
            <div class="css">Loading CSS</div>
            <div class="favicon">Loading Favicon : </div>
            <div class="broken-links">Broken A links : </div>
            <div class="xml">Invalid XML : </div>
          </div>
        </li>
      </template>

      <h3>Test results:</h3>
      <ol id="test-results"></ol>

      <iframe id="test-bed"></iframe>
    </article>
  </main>


</body>

</html>
